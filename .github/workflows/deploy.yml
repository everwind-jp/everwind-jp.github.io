name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          python3 << 'PYEOF'
          import re, subprocess

          # SUMMARY.mdからファイル名→ページ名マッピングを構築
          page_map = {}
          with open('SUMMARY.md', 'r') as f:
              for line in f:
                  m = re.search(r'\[(.+?)\]\((.+?)\)', line)
                  if m:
                      name, path = m.group(1), m.group(2)
                      page_map[path] = name

          # [wiki]プレフィックス付きコミット一覧を取得
          log = subprocess.run(
              ['git', 'log', '--pretty=format:%H|%ad|%s', '--date=short', '-100'],
              capture_output=True, text=True
          ).stdout.strip().split('\n')

          top_lines = []
          full_lines = []
          for entry in log:
              if not entry or '[wiki]' not in entry:
                  continue
              sha, date, msg = entry.split('|', 2)
              msg = msg.replace('[wiki] ', '')

              # このコミットで変更された.mdファイルを取得
              diff = subprocess.run(
                  ['git', 'diff-tree', '--no-commit-id', '-r', '--name-only', sha],
                  capture_output=True, text=True
              ).stdout.strip().split('\n')
              md_files = [f for f in diff if f.endswith('.md') and f not in ('README.md', 'SUMMARY.md', 'changelog.md')]

              # ページ名リンクに変換
              links = []
              for f in md_files:
                  name = page_map.get(f, None)
                  if name:
                      html = f.replace('.md', '.html').replace('README.html', 'index.html')
                      links.append(f'[{name}]({html})')

              line = f'- {date}: {msg}'
              full_line = line
              if links:
                  full_line += '\n  - 更新: ' + '、'.join(links)

              top_lines.append(line)
              full_lines.append(full_line)

          top_text = '\n'.join(top_lines[:10])
          full_text = '\n'.join(full_lines)

          for fname, tag_start, tag_end, text in [
              ('README.md', 'CHANGELOG_START', 'CHANGELOG_END', top_text),
              ('changelog.md', 'FULL_CHANGELOG_START', 'FULL_CHANGELOG_END', full_text),
          ]:
              with open(fname, 'r') as f:
                  content = f.read()
              content = re.sub(
                  rf'<!-- {tag_start} -->.*?<!-- {tag_end} -->',
                  f'<!-- {tag_start} -->\n' + text + f'\n<!-- {tag_end} -->',
                  content, flags=re.DOTALL)
              with open(fname, 'w') as f:
                  f.write(content)
          PYEOF

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "latest"

      - name: Build
        run: mdbook build

      - name: Generate sitemap.xml
        run: |
          SITE_URL="https://everwind-jp.github.io"
          echo '<?xml version="1.0" encoding="UTF-8"?>' > book/sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> book/sitemap.xml
          find book -name '*.html' ! -name 'print.html' ! -name '404.html' ! -name 'toc.html' | sort | while read f; do
            path="${f#book/}"
            echo "  <url><loc>${SITE_URL}/${path}</loc></url>" >> book/sitemap.xml
          done
          echo '</urlset>' >> book/sitemap.xml

      - name: Add redirect to 404 page
        run: |
          sed -i 's|</head>|<meta http-equiv="refresh" content="3;url=/"></head>|' book/404.html
          sed -i 's|<main>|<main><div style="text-align:center;padding:2em;"><p>ページが見つかりませんでした。3秒後にトップページへ移動します。</p><p><a href="/">トップページへ</a></p></div>|' book/404.html

      - name: Copy static files
        run: |
          cp robots.txt book/robots.txt
          cp google*.html book/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
