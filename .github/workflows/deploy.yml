name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          git log --pretty=format:"%ad: %s" --date=short -100 | grep -v "Co-Authored-By" | grep -v "Merge" | grep "^\S*: \[wiki\]" | sed 's/\[wiki\] //' | sed 's/^/- /' | head -10 > /tmp/changelog.txt
          python3 -c "
          import re
          with open('README.md', 'r') as f:
              content = f.read()
          with open('/tmp/changelog.txt', 'r') as f:
              changelog = f.read()
          content = re.sub(
              r'<!-- CHANGELOG_START -->.*?<!-- CHANGELOG_END -->',
              '<!-- CHANGELOG_START -->\n' + changelog + '\n<!-- CHANGELOG_END -->',
              content, flags=re.DOTALL)
          with open('README.md', 'w') as f:
              f.write(content)
          "

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "latest"

      - name: Build
        run: mdbook build

      - name: Generate sitemap.xml
        run: |
          SITE_URL="https://everwind-jp.github.io"
          echo '<?xml version="1.0" encoding="UTF-8"?>' > book/sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> book/sitemap.xml
          find book -name '*.html' ! -name 'print.html' ! -name '404.html' ! -name 'toc.html' | sort | while read f; do
            path="${f#book/}"
            echo "  <url><loc>${SITE_URL}/${path}</loc></url>" >> book/sitemap.xml
          done
          echo '</urlset>' >> book/sitemap.xml

      - name: Add redirect to 404 page
        run: |
          sed -i 's|</head>|<meta http-equiv="refresh" content="3;url=/"></head>|' book/404.html
          sed -i 's|<main>|<main><div style="text-align:center;padding:2em;"><p>ページが見つかりませんでした。3秒後にトップページへ移動します。</p><p><a href="/">トップページへ</a></p></div>|' book/404.html

      - name: Copy static files
        run: |
          cp robots.txt book/robots.txt
          cp google*.html book/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
