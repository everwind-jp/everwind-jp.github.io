[book]
title = "Everwind 日本語Wiki"
description = "Everwind（エバーウィンド）の日本語攻略Wiki"
authors = ["everwind-jp"]
language = "ja"
src = "."

[build]
build-dir = "book"

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
no-section-label = false
site-url = "/"
additional-css = ["theme/custom.css"]

[output.html.fold]
enable = true
level = 0
